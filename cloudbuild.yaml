steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/daily-puzzles-api', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/daily-puzzles-api']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'daily-puzzles-api'
      - '--image=gcr.io/$PROJECT_ID/daily-puzzles-api'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--timeout=300s'
      - '--set-env-vars=DEEPSOLVER_API_TOKEN=${_DEEPSOLVER_TOKEN}'
      - '--set-env-vars=CORS_ORIGINS=${_CORS_ORIGINS}'

images:
  - 'gcr.io/$PROJECT_ID/daily-puzzles-api'
