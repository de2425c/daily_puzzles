  /task/binary/cfr/schedule:
    post:
      operationId: cfr_schedule
      description: Schedule a request for NLH solver calculation.
      summary: Schedule NLH CFR
      tags:
      - CFR
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CFRRequest'
            examples:
              CfrSchedule:
                externalValue: https://s3.pl-waw.scw.cloud/deepsolver-files-prod/docs/examples/prod/holdem/cfr_schedule.json?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=SCWHYZBY2Z0418ZZ5CY4%2F20260112%2Feu-central-1%2Fs3%2Faws4_request&X-Amz-Date=20260112T225604Z&X-Amz-Expires=604800&X-Amz-SignedHeaders=host&X-Amz-Signature=dd95d16b20be41f082914a0cbbcc1098d7a65e3022e7ba91b403c054b61371d8
                summary: cfr_schedule
                description: Example request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CFRRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CFRRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CFRScheduleResponse'
          description: OK, task scheduled
        '400':
          description: Bad request
  /task/binary/cfr/schedule_multi:
    post:
      operationId: cfr_schedule_multi
      description: Schedule a request for NLH solver calculations for many boards
        in bulk.
      summary: Schedule NLH CFR in bulk
      tags:
      - CFR
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CFRMultiRemotePayloadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CFRMultiRemotePayloadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CFRMultiRemotePayloadRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CFRScheduleMultiResponse'
          description: OK, task scheduled
        '400':
          description: Bad request
