  /task/binary/cfr/result/{task_id}:
    get:
      operationId: cfr_results
      description: Get results of NLH solver calculation.
      summary: Get result of NLH CFR
      parameters:
      - in: path
        name: task_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - CFR
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CFRResult'
              examples:
                CfrResults:
                  externalValue: https://s3.pl-waw.scw.cloud/deepsolver-files-prod/docs/examples/prod/holdem/cfr_results.json?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=SCWHYZBY2Z0418ZZ5CY4%2F20260112%2Feu-central-1%2Fs3%2Faws4_request&X-Amz-Date=20260112T225604Z&X-Amz-Expires=604800&X-Amz-SignedHeaders=host&X-Amz-Signature=3a34bf7b866286728aae481b715910135092e59ad38813ca83bdc8e63dcc44c6
                  summary: cfr_results
                  description: Example response
          description: OK
        '404':
          description: Results missing
  /task/binary/cfr/result/files/{task_id}:
