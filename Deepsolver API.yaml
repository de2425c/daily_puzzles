      operationId: cfr_schedule_old
      description: Schedule a request for NLH solver calculation.
      summary: Schedule NLH CFR
      tags:
      - CFR old
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CFRRequest'
            examples:
              CfrScheduleOld:
                externalValue: https://s3.pl-waw.scw.cloud/deepsolver-files-prod/docs/examples/prod/holdem_old/cfr_schedule.json?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=SCWHYZBY2Z0418ZZ5CY4%2F20260112%2Feu-central-1%2Fs3%2Faws4_request&X-Amz-Date=20260112T225604Z&X-Amz-Expires=604800&X-Amz-SignedHeaders=host&X-Amz-Signature=92c642091f79042d503a938612b69fef9ae1434c741e66305f438fb0af8f89a6
                summary: cfr_schedule_old
                description: Example request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CFRRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CFRRequest'
        required: true
      responses:
