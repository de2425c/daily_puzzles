components:
  schemas:
    CFRFilesResult:
      type: object
      properties:
        results:
          type: object
          additionalProperties: {}
        engine_version:
          type: string
          description: Engine version
        fn_version:
          type: string
          description: API version
      required:
      - results
    CFRMultiRemotePayloadRequest:
      type: object
      properties:
        priority:
          type: integer
          maximum: 20
          minimum: 1
          default: 1
          description: Calculation priority
        boards:
          type: array
          items:
            type: string
        payload_url:
          type: string
      required:
      - boards
      - payload_url
    CFROptions:
      type: object
      properties:
        priority:
          type: integer
          maximum: 20
          minimum: 1
          default: 10
          description: Calculation priority
        send_every_nth_second:
          type: number
          format: double
          minimum: 1.0
          default: 1.0
        send_every_nth_iter:
          type: integer
          minimum: 100
          default: 100
        requested_attrs:
          type: array
          items: {}
          default:
          - strategy
        requested_nodes:
          type: array
          items: {}
          default:
          - r:0
        save_folds:
          type: boolean
          default: false
        save_raw_results:
          type: boolean
          default: false
    CFRRequest:
      type: object
      properties:
        iters:
          type: integer
          maximum: 50000
          minimum: 100
        tree_request:
          $ref: '#/components/schemas/TreeBuilder'
        ranges:
          type: array
          items:
            type: array
            items:
              type: number
              format: double
        board:
          type: string
        strategies_per_node_path:
          type: object
          additionalProperties: {}
          default: {}
        clip_ev:
          type: boolean
          default: false
        add_investments:
          type: boolean
          default: true
        correct_ev_for_node_compare:
          type: boolean
          default: false
        options:
          $ref: '#/components/schemas/CFROptions'
      required:
      - board
      - iters
      - options
      - ranges
    CFRResult:
      type: object
      properties:
        s3_paths:
          type: array
          items:
            type: string
        engine_version:
          type: string
          description: Engine version
        fn_version:
          type: string
          description: API version
      required:
      - s3_paths
    CFRScheduleMultiResponse:
      type: object
      properties:
        task_ids:
          type: array
          items:
            type: string
            format: uuid
        queue_pos:
          type: array
          items:
            type: integer
          description: Position in queue
        queue_eta:
          type: array
          items:
            type: number
            format: double
          description: Estimated time to start calculation (in seconds)
    CFRScheduleResponse:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
        queue_pos:
          type: integer
          description: Position in queue
        queue_eta:
          type: number
          format: double
          description: Estimated time to start calculation (in seconds)
    CFRURLResult:
      type: object
      properties:
        s3_urls:
          type: array
          items:
            type: string
            format: uri
        engine_version:
          type: string
          description: Engine version
        fn_version:
          type: string
          description: API version
      required:
      - s3_urls
    PokerEnum:
      enum:
      - HOLDEM
      - OMAHA
      type: string
      description: |-
        * `HOLDEM` - HOLDEM
        * `OMAHA` - OMAHA
    TreeBuilder:
      type: object
      properties:
        pot_fractions:
          type: array
          items:
            type: array
            items:
              type: array
              items:
                type: array
                items:
                  type: number
                  format: double
          nullable: true
        all_in_threshold:
          type: number
          format: double
        add_all_in_if_stack_lt_pot_times:
          type: integer
        pot_size:
          type: integer
        players_stacks_sizes:
          type: array
          items:
            type: integer
          minItems: 2
        poker:
          allOf:
          - $ref: '#/components/schemas/PokerEnum'
          default: HOLDEM
        max_all_in_depth:
          type: integer
          default: -1
        donk_pot_fractions:
          type: array
          items:
            type: array
            items:
              type: number
              format: double
          nullable: true
        street_id:
          type: integer
          maximum: 3
          minimum: 1
          nullable: true
          description: Street index, where 0 → preflop, 1 → flop, 2 → turn, 3 → river
        board:
          type: string
          nullable: true
          maxLength: 10
          minLength: 6
        ranges:
          type: array
          items:
            type: array
            items:
              type: number
              format: double
          nullable: true
        rake:
          type: array
          items:
            type: number
            format: double
          nullable: true
      required:
      - add_all_in_if_stack_lt_pot_times
      - all_in_threshold
      - players_stacks_sizes
      - pot_fractions
      - pot_size
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
x-tagGroups:
- name: Engine
  tags:
  - CFR
  - Treebuilder
- name: Engine - alternative schema
  tags:
  - CFR alternative
- name: Engine - old schema
  tags:
  - CFR old
